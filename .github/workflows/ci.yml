name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Backend: linting and type-checking ──────────────────────────────────────
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check .

      - name: Black format check
        working-directory: backend
        run: uv run black --check .

      - name: Mypy type check
        working-directory: backend
        run: uv run mypy app

  # ── Backend: tests with coverage ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: medhub_test
          POSTGRES_USER: medhub
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://medhub:testpassword@localhost:5432/medhub_test
      REDIS_URL: redis://localhost:6379/0
      OBJECT_STORE_ENDPOINT: http://localhost:9000
      OBJECT_STORE_ACCESS_KEY: minioadmin
      OBJECT_STORE_SECRET_KEY: minioadmin
      OBJECT_STORE_BUCKET: medhub-test
      SESSION_SIGNING_KEY: test-session-signing-key-32-bytes!
      SMTP_HOST: localhost
      SMTP_USER: test@example.com
      SMTP_PASSWORD: testpassword
      AT_REST_ENCRYPTION_KEY: test-at-rest-key-32-bytes-long!!!
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Run tests with coverage
        working-directory: backend
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=85

  # ── Frontend: linting and type-checking ────────────────────────────────────
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript type check
        working-directory: frontend
        run: npm run typecheck

  # ── Frontend: tests ─────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test -- --run

  # ── OpenAPI lint ────────────────────────────────────────────────────────────
  openapi-lint:
    name: OpenAPI Lint
    runs-on: ubuntu-latest
    needs: [backend-quality]
    env:
      DATABASE_URL: postgresql://medhub:testpassword@localhost:5432/medhub_test
      REDIS_URL: redis://localhost:6379/0
      OBJECT_STORE_ENDPOINT: http://localhost:9000
      OBJECT_STORE_ACCESS_KEY: minioadmin
      OBJECT_STORE_SECRET_KEY: minioadmin
      OBJECT_STORE_BUCKET: medhub-test
      SESSION_SIGNING_KEY: test-session-signing-key-32-bytes!
      SMTP_HOST: localhost
      SMTP_USER: test@example.com
      SMTP_PASSWORD: testpassword
      AT_REST_ENCRYPTION_KEY: test-at-rest-key-32-bytes-long!!!
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Export OpenAPI schema
        working-directory: backend
        run: uv run python -m app.export_openapi --output openapi.json

      - name: Lint OpenAPI schema
        working-directory: backend
        run: npx --yes @redocly/cli lint openapi.json

  # ── Docker builds ────────────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t medhub-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t medhub-frontend:ci ./frontend
