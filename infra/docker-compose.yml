version: "3.9"

# MedHub Docker Compose topology
# Only the reverse-proxy publishes ports 80/443. All other services
# communicate on the internal 'medhub' network.

networks:
  medhub:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  # ── Reverse Proxy (nginx) ─────────────────────────────────────────────────
  # Only service that publishes external ports. Enforces HTTPS + HSTS (SR-008).
  reverse-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - medhub
    restart: unless-stopped

  # ── Backend (FastAPI via Gunicorn + Uvicorn workers) ──────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: .env
    expose:
      - "8000"
    depends_on:
      - postgres
      - redis
      - createbuckets
    networks:
      - medhub
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend (nginx static) ───────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    networks:
      - medhub
    restart: unless-stopped

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: medhub
      POSTGRES_USER: medhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - medhub
    restart: unless-stopped

  # ── Redis 7 (sessions + Celery broker) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - medhub
    restart: unless-stopped

  # ── MinIO (S3-compatible object store, SSE-AES256) ────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORE_SECRET_KEY}
      # Enable SSE-AES256 at rest (SR-016)
      MINIO_KMS_SECRET_KEY: medhub-key:${AT_REST_ENCRYPTION_KEY}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - medhub
    restart: unless-stopped

  # ── MinIO bucket initialisation (one-shot) ────────────────────────────────
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${OBJECT_STORE_ACCESS_KEY} $${OBJECT_STORE_SECRET_KEY};
      mc mb --ignore-existing local/$${OBJECT_STORE_BUCKET:-medhub};
      mc anonymous set none local/$${OBJECT_STORE_BUCKET:-medhub};
      exit 0;
      "
    env_file: .env
    networks:
      - medhub

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=4
    env_file: .env
    depends_on:
      - redis
      - postgres
    networks:
      - medhub
    restart: unless-stopped
