# Reverse proxy: HTTP → HTTPS redirect + HSTS + TLS 1.2+
# Forwards /api/* to backend, everything else to frontend.

server {
    listen 80;
    server_name _;
    # Redirect all HTTP traffic to HTTPS (SR-008: data in transit encryption)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # TLS 1.2+ only (SR-008)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS — 1 year, includeSubDomains (SR-008)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Basic security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Route API calls to the backend service (internal network)
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check passthrough (no auth required)
    location /healthz {
        proxy_pass http://backend:8000;
    }

    # Serve frontend static files
    location / {
        proxy_pass http://frontend:80;
    }
}
